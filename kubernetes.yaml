apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ryo-discord-bot-data
  namespace: ryo-server
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ryo-discord-bot
  namespace: ryo-server
spec:
  selector:
    matchLabels:
      app: ryo-discord-bot
  replicas: 1
  template:
    metadata:
      labels:
        app: ryo-discord-bot
    spec:
      # PVC マウント先（/app/data）を非 root ユーザー（uid 1001）が書き込めるようにする
      securityContext:
        fsGroup: 1001
      containers:
      - name: ryo-discord-bot
        image: ghcr.io/ryo-icy/ryo-discord-bot:latest
        # 事前に .env から Secret を作成しておく:
        #   kubectl -n ryo-server create secret generic ryo-discord-bot-env --from-env-file=.env
        envFrom:
          - secretRef:
              name: ryo-discord-bot-env
        volumeMounts:
          - name: omikuji-data
            mountPath: /app/data
      volumes:
        - name: omikuji-data
          persistentVolumeClaim:
            claimName: ryo-discord-bot-data
