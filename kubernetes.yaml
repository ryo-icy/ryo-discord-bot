apiVersion: apps/v1
kind: Deployment
metadata:
  name: ryo-discord-bot
  namespace: ryo-server
spec:
  selector:
    matchLabels:
      app: ryo-discord-bot
  replicas: 1
  template:
    metadata:
      labels:
        app: ryo-discord-bot
    spec:
      containers:
      - name: ryo-discord-bot
        image: ghcr.io/ryo-icy/ryo-discord-bot:latest
        env:
            # Tokenはハードコーディングしないほうがいいよ(あくまでサンプル)
            - name: DISCORD_TOKEN
              value: ""
            - name: DEFAULT_ROLE_ID
              value: ""
            - name: TARGET_MESSAGE_ID
              value: ""
            - name: NAMEMC_CHANNEL_ID
              value: ""
