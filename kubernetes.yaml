apiVersion: apps/v1
kind: Deployment
metadata:
  name: ryo-discord-bot
  namespace: ryo-server
spec:
  selector:
    matchLabels:
      app: ryo-discord-bot
  replicas: 1
  template:
    metadata:
      labels:
        app: ryo-discord-bot
    spec:
      containers:
      - name: ryo-discord-bot
        image: ghcr.io/ryo-icy/ryo-discord-bot:latest
        # 事前に .env から Secret を作成しておく:
        #   kubectl -n ryo-server create secret generic ryo-discord-bot-env --from-env-file=.env
        envFrom:
          - secretRef:
              name: ryo-discord-bot-env
