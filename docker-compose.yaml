version: "3.9"
services:
  ryo-discord-bot:
    # image: "ghcr.io/ryo-icy/ryo-discord-bot:latest"
    build: ./app
    container_name: ryo-bot
    restart: always
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DEFAULT_ROLE_ID: ${DEFAULT_ROLE_ID}
      QUAKE_ALERT_CHANNEL: ${QUAKE_ALERT_CHANNEL}